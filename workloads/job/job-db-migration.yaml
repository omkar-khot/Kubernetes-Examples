apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: apps-prod
spec:
  completions: 1
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/my-org/sample-api-migrations:1.0.0
          envFrom:
            - secretRef:
                name: sample-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
