apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-report
  namespace: apps-prod
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report-generator
              image: ghcr.io/my-org/report-generator:1.0.0
              envFrom:
                - configMapRef:
                    name: report-config
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
